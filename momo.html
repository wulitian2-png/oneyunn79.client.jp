01.薄桃


少し早く咲いた　薄桃色の花が

もう　散ってしまう

あたしにとっての　最後のこの花が

柔らかい風と一緒に　あたしの周りを舞うの


薄桃色の世界で

初めて　君を見つけたとき

君は　何をしていたっけ？

君の顔ばかり見ていたから

よく覚えていないの


薄桃色の世界の中

君と出会って　始まった
