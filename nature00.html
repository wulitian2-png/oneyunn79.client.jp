nature00


<font size="2">

木の葉から滴り落ちた雫が

岩に染みついた　苔が

あの日の森の姿を　呼ぶ


還してくれれば　それでいい

還すことができるのなら　やってみればいい


今まで　壊してきたものを

すぐに　還せると言うのなら

早くやってみせればいい


できないと言うのなら

すぐにでも　此処から立ち去ればいい


美しきは　碧

肌の色でも　機械の色でも　ないのだから


</font>
