贖罪



“誰か”

呼ぶ名前も無ければ
この声すら　響かないのに

“どうして？”

届かないこと　知っていても
手を伸ばし続ける　格子の隙間から
光の滴を　必死で掻き集めて

深く深い　感触は遠い
手に余るほどの空気ばかり　この身体を纏い
もっと　もっと　
暖かいものがあったはずでしょう？

何を差し出せばいい？
何を捧げればいい？
何を奉ればいい？
この痛みを止めてくれるのなら
この体温さえ　奪い取ってくれればいい

そして　最後は
ただ　細く儚い白光でいいから
この指に　絡め取れたら………



※<a href="http://e-m.afz.jp/" target="_blank">「遠来未来」</a>様のPOEMBBSに投稿した詩です。
