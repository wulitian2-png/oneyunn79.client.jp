空に消えた君へ



「指令が下ったのは」

こんな背の低い格子すら　越えて行けない
愚かな　僕じゃなくて

こんな鋼鉄の闇さえも　笑って走り抜け
愚かな僕をただひたすら待っていてくれる
そう　君で

「空は」

足下を見つめて歩く　僕なんていらなくて
振り向いては　僕を引っ張る
君が　欲しくて

「だけど」

君が召された空より
僕が残された地の方が
ずっと　ずっと　日が当たるとしたら？

「神様」

どうか　空の君を返して
どうか　地の僕を連れていって
そして　どうか　地の君に光を
そして　どうか　空の僕に強さを




※歌詞ではありません
